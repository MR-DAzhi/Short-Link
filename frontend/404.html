<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 链接已失效</title>
    <style>
        body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); color: #f8fafc; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; text-align: center; }
        .box { padding: 2rem; }
        h1 { font-size: 6rem; margin: 0; background: linear-gradient(to right, #ef4444, #f43f5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; font-size: 1.2rem; margin: 1rem 0 2rem; }
        a { inline-block; padding: 10px 24px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; text-decoration: none; transition: 0.3s; }
        a:hover { background: #fff; color: #0f172a; }
    </style>
</head>
<body>
    <div class="box">
        <h1>404</h1>
        <p>抱歉，该短网址不存在或已被管理员删除。</p>
        <a href="/">返回首页</a>
    </div>
</body>
</html>
